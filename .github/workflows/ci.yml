name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Pack (dry run) — verify the publish payload
        run: npm pack --dry-run

      - name: Hook latency benchmark
        # Runs once per matrix cell so we have numbers on both
        # ubuntu-latest and macos-latest. N=30 keeps each cell under
        # ~15 s. Machine-readable BENCH:<...> lines are picked up by
        # CI annotations.
        run: ./scripts/bench-hook.sh 30
        shell: bash
